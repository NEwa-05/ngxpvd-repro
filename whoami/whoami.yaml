---
apiVersion: v1
kind: Namespace
metadata:
  name: whoami
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: whoami
  namespace: whoami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "32Mi"
            cpu: "50m"  
        image: traefik/whoami
        env:
          - name: WHOAMI_NAME
            value: whoami-k8s
        imagePullPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: whoami
  labels:
    app: whoami
spec:
  type: ClusterIP
  ports:
  - port: 80
    name: whoami
  selector:
    app: whoami
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-traefik-ingress
  namespace: whoami
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: whoami-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whoami
            port:
              number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: headers
  namespace: whoami
spec:
  headers:
    customRequestHeaders:
      ingctr-name: "traefik"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect
  namespace: whoami
spec:
  redirectRegex:
    regex: "^http://localhost:19080/?$"
    replacement: http://whoami.localdemo.mageekbox.eu:19080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-nginx-ingress
  namespace: whoami
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: http://whoami.localdemo.mageekbox.eu:19080
    nginx.ingress.kubernetes.io/configuration-snippet: |
       proxy_set_header ingctr-name "nginx";
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whoami
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-nginxtmp-ingress
  namespace: whoami
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: http://whoami.localdemo.mageekbox.eu:19080
spec:
  # ingressClassName: nginx-tmp
  ingressClassName: tmp-nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whoami
            port:
              number: 80
